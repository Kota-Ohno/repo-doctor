name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build, for example v0.1.1.
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-15
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-2025-vs2026
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref_name }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package Unix
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/repo-doctor" dist/
          tar -C dist -czf "repo-doctor-${{ matrix.target }}.tar.gz" repo-doctor
          shasum -a 256 "repo-doctor-${{ matrix.target }}.tar.gz" > "repo-doctor-${{ matrix.target }}.tar.gz.sha256"
      - name: Package Windows
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/repo-doctor.exe" dist/
          Compress-Archive -Path "dist/repo-doctor.exe" -DestinationPath "repo-doctor-${{ matrix.target }}.zip"
          $hash = Get-FileHash "repo-doctor-${{ matrix.target }}.zip" -Algorithm SHA256
          "$($hash.Hash.ToLower())  repo-doctor-${{ matrix.target }}.zip" | Out-File -Encoding ascii "repo-doctor-${{ matrix.target }}.zip.sha256"
      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" --verify-tag --title "${RELEASE_TAG}" --notes "repo-doctor ${RELEASE_TAG}" || true
          fi
          gh release upload "${RELEASE_TAG}" \
            "repo-doctor-${{ matrix.target }}.${{ matrix.archive }}" \
            "repo-doctor-${{ matrix.target }}.${{ matrix.archive }}.sha256" \
            --clobber
