name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - uses: crate-ci/typos@v1.46.3
      - run: cargo install taplo-cli --locked
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo nextest run
      - run: cargo test --doc
      - run: taplo fmt --check
      - run: sh -n scripts/install.sh
      - name: Smoke test install.sh with local release assets
        shell: bash
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          target="x86_64-unknown-linux-gnu"
          printf '#!/usr/bin/env sh\necho repo-doctor smoke\n' > "$tmp/repo-doctor"
          chmod +x "$tmp/repo-doctor"
          tar -C "$tmp" -czf "$tmp/repo-doctor-$target.tar.gz" repo-doctor
          sha256sum "$tmp/repo-doctor-$target.tar.gz" > "$tmp/repo-doctor-$target.tar.gz.sha256"
          REPO_DOCTOR_BASE_URL="file://$tmp" sh scripts/install.sh --version test --dir "$tmp/bin"
          "$tmp/bin/repo-doctor"
      - name: Smoke test npm installer with local release assets
        shell: bash
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          target="x86_64-unknown-linux-gnu"
          printf '#!/usr/bin/env sh\necho repo-doctor npm smoke\n' > "$tmp/repo-doctor"
          chmod +x "$tmp/repo-doctor"
          tar -C "$tmp" -czf "$tmp/repo-doctor-$target.tar.gz" repo-doctor
          sha256sum "$tmp/repo-doctor-$target.tar.gz" > "$tmp/repo-doctor-$target.tar.gz.sha256"
          rm -rf packaging/npm/vendor
          REPO_DOCTOR_BASE_URL="file://$tmp" REPO_DOCTOR_TARGET="$target" node packaging/npm/scripts/install.js
          packaging/npm/vendor/repo-doctor
      - run: ruby -e 'require "yaml"; YAML.load_file("action.yml")'
      - run: cargo run -- ci --template generic > /tmp/repo-doctor.yml
      - run: ruby -e 'require "yaml"; YAML.load_file("/tmp/repo-doctor.yml")'

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo audit
      - run: cargo deny check
